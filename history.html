<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Agent Eval History</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="bg-orb orb-1"></div>
  <div class="bg-orb orb-2"></div>
  <div class="page-shell">
    <header class="topbar glass">
      <div>
        <p class="eyebrow">Local trend tracking</p>
        <h1>Evaluation History</h1>
      </div>
      <div class="topbar-actions">
        <a class="secondary-btn" href="index.html">Back to evaluator</a>
        <button id="themeToggle" class="icon-btn" aria-label="Toggle theme">🌙</button>
      </div>
    </header>

    <main class="layout history-layout">
      <section class="panel glass">
        <div class="section-header">
          <div>
            <h3>Score trends</h3>
            <p>LocalStorage-backed chart of overall scores over time.</p>
          </div>
          <button id="clearHistoryBtn" class="secondary-btn danger">Clear history</button>
        </div>
        <div class="chart-wrap">
          <canvas id="historyChart" width="1200" height="420"></canvas>
        </div>
      </section>

      <section class="panel glass">
        <div class="section-header">
          <div>
            <h3>Saved runs</h3>
            <p>Recent evaluations with preset and score summaries.</p>
          </div>
        </div>
        <div id="historyList" class="history-list"></div>
      </section>
    </main>
  </div>
  <script src="app.js"></script>
</body>
</html>
