<!doctype html><html lang="en"><head><meta charset="UTF-8" /><meta name="viewport" content="width=device-width, initial-scale=1.0" /><title>Agent Eval</title><link rel="stylesheet" href="/styles.css" /></head><body><div class="app"><header class="topbar"><div><h1>Agent Eval</h1><p class="subtitle">Real backend-powered AI output evaluation</p></div><div class="actions"><button id="themeToggle">Toggle theme</button></div></header><main class="grid"><section class="card"><h2>Evaluate text</h2><label>Title<input id="evalTitle" placeholder="Optional label" /></label><label>Text<textarea id="evalText" rows="10" placeholder="Paste AI output here..."></textarea></label><label>Keywords (comma-separated)<input id="keywords" placeholder="accuracy, summary, action items" /></label><div class="weights"><label>Length<input id="wLength" type="number" step="0.05" value="0.2" /></label><label>Keywords<input id="wKeywords" type="number" step="0.05" value="0.35" /></label><label>Readability<input id="wReadability" type="number" step="0.05" value="0.2" /></label><label>Structure<input id="wStructure" type="number" step="0.05" value="0.25" /></label></div><div class="row"><button id="evaluateBtn">Evaluate</button><button id="saveConfigBtn">Save config</button></div><div id="evalResult"></div></section><section class="card"><h2>Compare two texts</h2><div class="compare-grid"><textarea id="leftText" rows="8" placeholder="Left text"></textarea><textarea id="rightText" rows="8" placeholder="Right text"></textarea></div><button id="compareBtn">Compare</button><div id="compareResult"></div></section><section class="card"><h2>Stats</h2><div id="stats"></div></section><section class="card"><h2>Saved configs</h2><div id="configs"></div></section><section class="card full"><h2>History</h2><div id="history"></div></section></main></div><script src="/app.js"></script></body></html>
