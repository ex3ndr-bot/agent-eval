<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Agent Eval</title>
  <style>
    :root {
      color-scheme: light;
      --bg: #f6f1e8;
      --panel: #fffaf2;
      --line: #d7cab4;
      --ink: #1f1f1f;
      --accent: #0f766e;
      --muted: #6b665d;
    }
    body {
      margin: 0;
      font-family: Georgia, "Times New Roman", serif;
      color: var(--ink);
      background:
        radial-gradient(circle at top left, rgba(15,118,110,0.12), transparent 30%),
        linear-gradient(135deg, #f7f1e7, #efe6d7);
    }
    main {
      max-width: 960px;
      margin: 0 auto;
      padding: 32px 20px 48px;
    }
    .grid {
      display: grid;
      gap: 20px;
      grid-template-columns: 1.2fr 0.8fr;
    }
    .panel {
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: 16px;
      padding: 20px;
      box-shadow: 0 12px 40px rgba(49, 37, 12, 0.08);
    }
    h1, h2 {
      margin-top: 0;
      letter-spacing: 0.02em;
    }
    label {
      display: block;
      margin: 12px 0 6px;
      font-weight: 700;
    }
    textarea, select, input {
      width: 100%;
      box-sizing: border-box;
      padding: 10px 12px;
      border-radius: 10px;
      border: 1px solid var(--line);
      background: #fff;
      color: var(--ink);
      font: inherit;
    }
    button {
      margin-top: 16px;
      padding: 12px 18px;
      border: 0;
      border-radius: 999px;
      background: var(--accent);
      color: white;
      font-weight: 700;
      cursor: pointer;
    }
    .muted {
      color: var(--muted);
    }
    .result pre {
      white-space: pre-wrap;
      overflow-wrap: anywhere;
      background: #fcf7ef;
      border-radius: 10px;
      padding: 14px;
      border: 1px solid var(--line);
    }
    @media (max-width: 800px) {
      .grid {
        grid-template-columns: 1fr;
      }
    }
  </style>
</head>
<body>
  <main>
    <div class="grid">
      <section class="panel">
        <h1>Agent Eval</h1>
        <p class="muted">Evaluate text, code, or structured outputs with local heuristics.</p>
        <form method="post" action="/evaluate">
          <label for="candidate">Candidate output</label>
          <textarea id="candidate" name="candidate" rows="10">{{ form.candidate }}</textarea>

          <label for="reference">Reference or expected output</label>
          <textarea id="reference" name="reference" rows="10">{{ form.reference }}</textarea>

          <label for="output_format">Output format</label>
          <select id="output_format" name="output_format">
            {% for value in formats %}
            <option value="{{ value }}" {% if form.output_format == value %}selected{% endif %}>{{ value }}</option>
            {% endfor %}
          </select>

          <label for="strategy">Strategy</label>
          <select id="strategy" name="strategy">
            {% for value in strategies %}
            <option value="{{ value }}" {% if form.strategy == value %}selected{% endif %}>{{ value }}</option>
            {% endfor %}
          </select>

          <button type="submit">Run Evaluation</button>
        </form>
      </section>
      <section class="panel result">
        <h2>Latest Result</h2>
        {% if result %}
        <pre>{{ result }}</pre>
        {% else %}
        <p class="muted">Submit an evaluation to see the result here.</p>
        {% endif %}
      </section>
    </div>
  </main>
</body>
</html>
